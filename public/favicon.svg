<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#182228"/>
      <stop offset="100%" stop-color="#0F1418"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect
    width="64"
    height="64"
    rx="16"
    fill="url(#bg)"
  />

  <text
    x="17"
    y="42"
    font-size="28"
    font-family="Inter, Arial, sans-serif"
    font-weight="700"
    fill="#F8FAFC"
  >
    PC
  </text>

  <circle
    cx="52"
    cy="40"
    r="3.5"
    fill="#20B2A6"
    filter="url(#glow)"
  />
</svg>